<script id="md" type="text/markdown"># Boris Cherny's CLAUDE.md — The Canonical Template

**Author of the pattern:** Boris Cherny — Anthropic staff engineer, creator of Claude Code (originally built as a side project in his first month at Anthropic; by the time Claude Code launched publicly in May 2025, over 80% of Anthropic's engineers were using it daily).

**Why it matters:** Boris's own CLAUDE.md and the workflow rules he published on X became the de facto template that the wider community now cargo-cults. If you've seen a CLAUDE.md with sections like "Workflow Orchestration," "Self-Improvement Loop," and "Verification Before Done," you're looking at a descendant of Boris's file. His team at Anthropic keeps a CLAUDE.md in git at roughly 2.5k tokens — the reference weight class.

This guide reconstructs the template, explains *why* each section exists, and compares it to what Victor already runs in `/home/victor/.claude/CLAUDE.md`.

---

## What it is

CLAUDE.md is the single highest-leverage file in the Claude Code harness. Claude Code injects it into the context window at the **start of every session**, before the user's first message. It's the only persistent memory primitive that survives compaction, resumes, and cross-session restarts. Nothing else — not chat history, not subagent output, not tool results — is guaranteed to stick.

Boris's core insight: *CLAUDE.md is a compounding asset*. Every correction you give Claude should be distilled into a rule in CLAUDE.md, so future sessions never make the same mistake twice. The file is not documentation for humans — it is a behavioral contract for the model.

## How it works under the hood

- Claude Code auto-discovers `./CLAUDE.md` (project), `~/.claude/CLAUDE.md` (global), and `.claude/CLAUDE.md` in parent dirs (walks up the tree).
- All discovered files are **concatenated and prepended** to the system prompt.
- `/init` scaffolds a starter CLAUDE.md by scanning the project (language, framework, build/test commands, style).
- `#` prefix in a normal Claude message auto-appends that line to CLAUDE.md — Boris's favorite shortcut for the self-improvement loop.
- Target weight: **under 200 lines / under 2-3k tokens**. Larger files measurably reduce instruction adherence — Claude starts "forgetting" rules buried mid-file.

## Key mechanics (Boris's rules, annotated)

Boris's publicly posted rules crystallize into these sections. The exact wording varies by gist (there are at least four circulating community copies), but the structure is consistent:

### 1. Workflow Orchestration — "Plan first, execute second"

```markdown
## Workflow
- For any non-trivial task (3+ steps or architectural decisions), enter plan mode first.
- Write the plan to disk before executing. Get explicit approval before you start editing files.
- Break work into phases. Each phase ends with a verification step.
- Never start coding without a written goal and a verification strategy.
```

*Why:* Claude's default behavior is to dive in. Forcing a written plan makes the model's reasoning visible, lets the human catch bad assumptions cheaply, and creates a contract it can check itself against later. This is the pattern the Superpowers `writing-plans` + `executing-plans` chain formalizes.

### 2. Subagents — "Keep the main context clean"

```markdown
## Subagents
- Use subagents liberally. The main conversation is a precious resource.
- Dispatch anything exploratory (searching, reading unknown files, running tests) to a subagent.
- Subagents return summaries, not transcripts. You don't burn tokens on the tool noise.
- Parallelize independent tasks — spawn 3-5 subagents at once rather than serially.
```

*Why:* The main context window is where the actual planning and decision-making happens. Every file you read, every failed test output, every grep result eats tokens that could be used for reasoning. Subagents are a context-compression mechanism.

### 3. Verification Before Done — "Never claim completion without proof"

```markdown
## Verification
- Before claiming any task is complete: run the tests, run the linter, run the type checker.
- If the user's request implies "it should work" — prove it works end-to-end, don't just compile.
- If you wrote a function, write a test. If you wrote a test, run it. If it fails, fix it.
- Never say "done" if you haven't verified. Say "I believe this is done pending X."
```

*Why:* The single most common failure mode of LLMs is confident false completion. Boris's rule: the model must produce evidence, not assertion.

### 4. Self-Improvement Loop — "Every correction becomes a rule"

```markdown
## Self-Improvement
- When I correct you, end your response with:
  "Updating CLAUDE.md so I don't make this mistake again."
- Then actually update CLAUDE.md with a new rule that would have prevented the mistake.
- Ruthlessly edit CLAUDE.md over time. Delete rules that no longer apply. Merge duplicates.
```

*Why:* This is the compounding mechanism. Boris's own quote: *"Invest in your CLAUDE.md. After every correction, end with 'Update your CLAUDE.md so you don't make that mistake again.' Claude is effective at writing rules for itself."* Over weeks, Claude's mistake rate on your codebase measurably drops.

### 5. Autonomous Bug Fixing — "Reproduce, then fix"

```markdown
## Bugs
- Before fixing: reproduce the bug with a failing test.
- The test must fail for the right reason (the bug), not a different reason (typo, missing import).
- Only then write the fix. Re-run the test. Confirm it passes. Run the full suite.
- If the bug is ambiguous, ask for clarification before coding.
```

*Why:* Mirrors TDD discipline and cuts the "fixed something unrelated" failure mode.

### 6. Project context (the boilerplate head of the file)

```markdown
# Project Name
Language: Python 3.12
Framework: FastAPI + SQLAlchemy
Package manager: uv
Tests: pytest (run with `uv run pytest`)
Lint: ruff (run with `uv run ruff check`)
Typecheck: mypy (strict mode)

## Conventions
- Prefer dataclasses over dicts for structured data.
- All public functions get type hints.
- Never use `print` — use the `logging` module.
- Tests live in `tests/` mirroring `src/` layout.
```

*Why:* This is the cheap, obvious part everyone gets right. It's the behavioral rules above that distinguish Boris's template from a README.

## Quick start

```bash
# In any project, scaffold a starter file
cd my-project
claude
> /init

# Then iterate — every time Claude makes a mistake, tell it:
> "That was wrong. Update CLAUDE.md so you don't do it again."

# Or use the # shortcut to append a rule inline
> # Always run `uv run pytest` not `pytest`

# Keep it lean — check length regularly
wc -l CLAUDE.md   # target: under 200 lines
```

**Copy-paste starter** (drop into any project root):

```markdown
# [Project Name]
[One-line description.]

Stack: [language, framework, package manager]
Build: `[command]`
Test: `[command]`
Lint: `[command]`

## Workflow
- For any task with 3+ steps, enter plan mode. Write the plan before editing.
- Use subagents for exploration, searching, and reading unknown files.
- Never claim "done" without running tests + lint + typecheck.

## Conventions
- [Style rule 1]
- [Style rule 2]

## Verification
- Before shipping: `[test command]` && `[lint command]` && `[typecheck command]`
- All must pass. No exceptions.

## Bugs
- Reproduce with a failing test before fixing.
- Test must fail for the right reason.

## Self-improvement
- When corrected, update this file with a rule that would have prevented the mistake.
- Every rule in this file earned its place by catching a real bug.
```

## Contrast with Victor's global CLAUDE.md

Victor's `/home/victor/.claude/CLAUDE.md` is a **fundamentally different genre** of CLAUDE.md than Boris's. Key differences worth understanding:

| Dimension | Boris's template | Victor's global |
|---|---|---|
| **Scope** | Per-project behavioral contract | Global meta-orchestrator across ALL projects |
| **Length** | ~200 lines, ~2.5k tokens | ~250 lines but dense with tables |
| **Focus** | Workflow discipline (plan → execute → verify) | Skill routing + knowledge base pointers |
| **Self-improvement loop** | Yes — "every correction becomes a rule" | Implicit via the forge/retro/flywheel skills |
| **Trigger mapping** | Not present | Extensive — keyword → skill table |
| **Domain knowledge** | Project-specific conventions | AI3 resource catalog, installed plugins/MCPs |
| **Security rules** | Not present | Top-level CRITICAL block on secret protection |

**What Victor's file does that Boris's doesn't:**
- Maps user trigger words to specific skill invocations (Boris has no skills system at his abstraction level).
- Treats the knowledge flywheel (`/flywheel`, `/forge`, `/inject`) as default-on.
- Enumerates the installed plugin/MCP inventory so Claude knows what tools exist.
- Points to an external resource catalog (`ai3-resources/`) that the agent can cross-reference.

**What Boris's file does that Victor's doesn't (at the global level):**
- Explicit plan-mode gating for non-trivial tasks.
- Explicit verification-before-done discipline (Victor delegates this to the `verification-before-completion` superpower).
- The self-improvement loop as a first-class mechanic ("every correction becomes a rule").
- Lean, project-specific behavioral rules with teeth.

**The gap to close:** Victor's global CLAUDE.md is excellent at orchestration but light on direct behavioral discipline — it relies on the skill layer to enforce plan mode, TDD, and verification. Boris's pattern pushes that discipline directly into the file so it's enforced even in lightweight sessions where no skill was explicitly invoked. A hybrid per-project CLAUDE.md that inherits Victor's global triggers and adds a Boris-style Workflow/Verification/Self-improvement block would capture both.

## Gotchas

1. **Length creep kills adherence.** Past ~300 lines, Claude starts ignoring rules in the middle of the file. Ruthlessly prune.
2. **CLAUDE.md is not documentation.** Don't write prose, write rules. "The foo module does X" is dead weight; "Always use the foo module's `safe_parse`, never `parse`" is a rule with teeth.
3. **Rules without teeth are ignored.** "Prefer X" is weaker than "Never Y." Boris's negative-constraint framing ("NEVER commit with --no-verify") works because it names the exact failure mode.
4. **The self-improvement loop only works if you actually run it.** The discipline is: every time you correct Claude, ask it to update CLAUDE.md. If you skip that step once, the loop is broken.
5. **Global + project files concatenate.** Don't repeat global rules in every project file — Claude reads both.
6. **Community gists are not canonical.** There are at least four different "Boris's CLAUDE.md" gists circulating. They agree on structure but differ on wording. Treat them all as reference, not gospel.

## What we could build with it

- **A per-project CLAUDE.md generator** that fuses Victor's global orchestration rules with Boris's behavioral discipline blocks, auto-populated from project introspection (stack detection, test/lint commands).
- **A CLAUDE.md linter** that flags length creep, rule duplication, weak positive framing, and un-earned rules (rules without git blame showing a corresponding correction).
- **A self-improvement loop hook** — a PostToolUse hook that detects user corrections in the transcript and prompts Claude to propose a CLAUDE.md diff.
- **A rule-provenance tracker** — every rule in CLAUDE.md links back to the commit/conversation that introduced it, so stale rules can be pruned with evidence.
