<script id="md" type="text/markdown"># Avellaneda-Stoikov + Hawkes Processes — Market Making and Order-Flow Alpha

The two canonical building blocks of academic HFT: a closed-form model for where to quote (Avellaneda-Stoikov) and a statistical model for when trades cluster (Hawkes). Together they describe the two halves of a market maker's problem — *price* the quotes, then *time* the quotes.

**Cloned repo:** `repos/avellaneda-stoikov/` (from https://github.com/fedecaccia/avellaneda-stoikov)

---

## 1. Avellaneda-Stoikov — the canonical market-making model

### What it is

A 2008 paper by Marco Avellaneda and Sasha Stoikov, "High Frequency Trading in a Limit Order Book," that solves a specific problem: a market maker holds inventory `q`, faces a mid-price `s` that diffuses as Brownian motion, and must choose bid/ask quotes continuously. Where should they post to maximize terminal utility while controlling inventory risk?

The answer is two formulas — the *reservation price* and the *optimal spread* — and those two formulas are the foundation for essentially every serious MM model that followed.

### How it works

The maker has a utility function (exponential, risk-averse with parameter `γ`). They post quotes symmetrically around a **reservation price** that is shifted away from mid based on current inventory. If you're long, you skew quotes lower to encourage sells. If you're short, you skew higher. The spread itself widens with volatility, time-to-horizon, and risk aversion.

### Key mechanics — the two formulas

**Reservation price** (your private indifference price given inventory):

```
r(s, q, t) = s − q · γ · σ² · (T − t)
```

- `s` — current mid
- `q` — signed inventory (positive = long)
- `γ` — risk aversion (higher = more skew)
- `σ²` — variance of mid-price
- `(T − t)` — time remaining until horizon

**Optimal bid-ask spread**:

```
δ_ask + δ_bid = γ · σ² · (T − t) + (2/γ) · ln(1 + γ/k)
```

- `k` — order-book liquidity parameter (intensity decay of the limit-order arrival function `λ(δ) = A · exp(−k·δ)`)
- `A` — base arrival intensity

Then you post:
- Bid at `r − (spread / 2)`
- Ask at `r + (spread / 2)`

The first term of the spread is the *inventory term* (widens with risk). The second is the *adverse selection term* (widens when order flow is thin). This is the whole engine.

### The repo — `fedecaccia/avellaneda-stoikov`

Cloned to `repos/avellaneda-stoikov/`. Minimal Python implementation, ~200 lines. Core loop from `src/main.py`:

```python
# Risk aversion
gamma = 0.1
# Liquidity parameter (exponential decay of fill intensity)
k = 1.5
# Mid-price follows Brownian motion
sigma = 2

for i in range(N):
    # Reservation price — skews away from inventory
    r[i] = s[i] - q[i] * gamma * (sigma**2) * (T - t[i])
    # Optimal half-spread
    r_spread = gamma * (sigma**2) * (T - t[i]) + (2/gamma) * math.log(1 + gamma/k)
    # Quotes
    r_ask = r[i] + r_spread / 2
    r_bid = r[i] - r_spread / 2
    # Simulate Poisson fills with intensity A*exp(-k*delta)
    ...
```

The repo includes a `doc/` folder with the original paper and follow-ups (Guéant-Lehalle-Tapia closed-form extension, mean-reversion variants). Good starting point, but known limitations: Brownian mid is unrealistic, `k` and `A` need live calibration, no queue-position model.

### Quick start

```bash
cd /home/victor/Desktop/Projects/claude/ai-catalogs/repos/avellaneda-stoikov/
pip install numpy matplotlib
python src/main.py
```

Runs 100 simulated sessions and plots PnL distribution. Tweak `gamma`, `k`, `sigma` and watch how the spread and skew react.

### Known limitations (and what the follow-ups fix)

- **Brownian mid** — real prices jump. Fix: use a jump-diffusion or Hawkes-modulated mid.
- **Fixed `k`** — real liquidity is regime-dependent. Fix: rolling calibration from trade flow.
- **Symmetric fills** — adverse selection makes them asymmetric. Fix: asymmetric `k_bid`, `k_ask`.
- **No queue model** — AS assumes you fill instantly at the quoted price. Fix: queue-position aware extensions (Guéant-Lehalle).
- **Single asset** — multi-asset version requires solving a coupled HJB. Fix: Guéant 2017.

For a modern RL extension, see `javifalces/HFTFramework` — reinforcement learning on top of AS for dynamic `γ` and `k`.

## 2. Hawkes processes — order flow is self-exciting

### What it is

A Hawkes process is a point process where the arrival of an event temporarily increases the probability of more events. Classic example: earthquakes (a big one triggers aftershocks). In markets: a trade begets more trades. Order flow is demonstrably self-exciting — if you watch BTC-PERP on Hyperliquid for 10 seconds, you see this with your own eyes. Buys cluster. Sells cluster. Quiet periods are quiet.

Avellaneda-Stoikov assumes trades arrive as a plain Poisson process (constant intensity `A`). That assumption is wrong at HFT timescales. Replacing it with a Hawkes intensity is the single biggest realism upgrade.

### How it works — the math

A univariate Hawkes process has a conditional intensity:

```
λ(t) = μ + Σ_{t_i < t} α · exp(−β (t − t_i))
```

- `μ` — baseline intensity (exogenous flow)
- `α` — jump in intensity per event (self-excitation strength)
- `β` — decay rate (how fast excitement dies)
- Branching ratio `n = α/β` must be `< 1` for stability. `n` near 1 means the process is critical — heavy clustering, close to explosive.

For **order flow**, you want a *bivariate* or *multivariate* Hawkes with buy and sell streams that excite each other asymmetrically. The 4-dimensional version (bid market orders, ask market orders, bid limit orders, ask limit orders) is the standard for LOB research.

### Key intuition

- **Self-excitation** captures momentum at the micro scale — a large buy market order raises the probability of more buy market orders over the next ~100ms.
- **Cross-excitation** captures the order-book reaction — a market buy raises the probability of a cancellation on the ask and a new limit ask higher up.
- **Branching ratio** is a regime detector. `n ≈ 0.9+` = critical, clustered, dangerous to provide liquidity. `n ≈ 0.5` = calm.
- Fitted `μ`, `α`, `β` give you an **instantaneous order-flow imbalance forecast** — the true signal every MM and taker wants.

### Repos worth pulling

- **`x-datainitiative/tick`** — production-grade Python library for Hawkes fitting. Handles MLE, EM, and sum-of-exponentials kernels. The go-to for serious work.
- **`jeremymck/High-Frequency-Data---Limit-Order-Books`** — pedagogical notebooks covering LOB simulation + Hawkes estimation end-to-end.
- **`sohaibelkarmi/High-Frequency-Trading-Simulator`** — C++ LOB with Hawkes-driven order flow, Python bindings.

### Quick start with `tick`

```python
from tick.hawkes import HawkesExpKern, SimuHawkesExpKernels
import numpy as np

# Fit a 2D Hawkes (buys, sells) on your trade timestamps
# timestamps = [np.array([buy_times]), np.array([sell_times])]
decays = np.array([[5.0, 5.0], [5.0, 5.0]])  # β per pair
learner = HawkesExpKern(decays, penalty='l2', C=1e3)
learner.fit(timestamps)

# adjacency[i][j] = α from stream j exciting stream i
print("Branching matrix:\n", learner.adjacency)
print("Baseline:", learner.baseline)
print("Spectral radius (stability):", np.max(np.abs(np.linalg.eigvals(learner.adjacency))))
```

Roll this on 1-minute windows and you have a live order-flow-clustering monitor.

## 3. Putting them together — the modern MM stack

The research consensus for the last ~8 years has been: replace Avellaneda-Stoikov's constant `A, k` with Hawkes-derived, regime-aware estimates.

**The combined loop:**

1. Maintain a rolling Hawkes fit on trade timestamps (fit every N seconds).
2. Convert the fitted intensity into a live forecast `λ̂(t)` for the next fill window.
3. Feed `λ̂` into AS as a time-varying `A`. Also use branching ratio to modulate `γ` — get more risk-averse when `n → 1`.
4. Skew quotes with the AS reservation price, sized with AS spread, but gated by the Hawkes regime (don't quote when `n` is critical unless spread compensates).
5. (Optional) Train an RL agent to choose `γ` dynamically — that's what `javifalces/HFTFramework` and `im1235/ISAC` (Soft Actor-Critic on AS) do.

## 4. How this plugs into Victor's trading-agent-team

The current trading-agent-team at `/home/victor/Desktop/Projects/claude/agents/trading-agent-team/` is built around *taker* strategies — fast cyclers, graduated TP, ensembles across 8 coins. AS + Hawkes opens a **second leg of the strategy**: a maker leg that generates uncorrelated PnL from spread capture rather than directional alpha.

**Concrete integration ideas:**

1. **Hawkes as a regime filter for the existing taker strategies.** Fit a bivariate Hawkes on trade tape per coin. When branching ratio spikes above ~0.9, the fast-cycler TP logic should tighten because reversals become more likely. This is a pure overlay — no new strategy, just a kill switch / sizing knob. Lowest-risk way to start.

2. **Order-flow imbalance as a feature** for the Oracle Commander / Rolodex selector. Add the ratio of buy-excited to sell-excited intensity as a short-horizon feature. Should add signal to coin rotation decisions at 1-5 minute horizons.

3. **Hyperliquid maker leg.** Hyperliquid pays maker rebates. A disciplined AS quoter on a liquid pair (HYPE, SOL) sized small could produce steady edge and double as *inventory* for the taker strategies — when the maker leg accumulates a long, the taker leg can ride it out instead of fighting it. This is the pattern HL-Delta uses in `agents:repos/HL-Delta/`.

4. **Challenge-game parameter sweep.** AS has exactly the shape that `/challenge-game` was built for: 3 numeric parameters (`γ`, `k`, `horizon_T`), a clear fitness function (Sharpe of simulated PnL), and fast evaluation. Run a tournament against replayed Hyperliquid L2 data.

5. **Watchdog layer for Unicron.** The Hawkes branching ratio is a clean scalar "how crazy is order flow right now" number. Pipe it into the Unicron oversight watchdog (`project_unicron_oversight_spec.md`) as an auto-pause trigger when it crosses a threshold.

**Data requirement:** All of this needs trade-level tape, not OHLCV. Hyperliquid's WebSocket gives trade ticks for free — that's the data path. For order-book state (needed for full Hawkes LOB models) you need L2 snapshots, which `flowsurface` in `agents:repos/flowsurface/` already handles in Rust.

## 5. Further reading

- Avellaneda & Stoikov (2008) — the original paper, in `repos/avellaneda-stoikov/doc/`.
- Guéant, Lehalle, Fernandez-Tapia (2013) — closed-form extension with inventory bounds.
- Bacry, Mastromatteo, Muzy (2015) — "Hawkes processes in finance," the definitive survey.
- Bacry & Muzy (2014) — Hawkes estimation of market impact.
- Cartea, Jaimungal, Penalva — *Algorithmic and High-Frequency Trading* (textbook). The chapter on AS is the clearest exposition out there.
- *Deep Hawkes process for high-frequency market making* — Journal of Banking and Financial Technology, 2024 (neural extension).
