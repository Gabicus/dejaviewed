## Thesis

Claude Code + Figma + Runway + Higgsfield + TouchDesigner enables a single person to produce marketing, video, interactive art, and web design at agency quality — the creative middle class is being born.

---

## Why it matters

The creative collection tells a single story: the minimum viable creative agency is now one person with the right AI tools. Not in a 'kinda works if you squint' way — in a 'produced a full marketing campaign, interactive art installation, and production website in a weekend' way. Claude Code isn't just a coding tool here; it's the orchestration layer that connects Figma (design), Runway/Higgsfield (video), TouchDesigner (interactive), and React (web) into a unified creative pipeline. The creative middle class — people with taste but not a team — now has a studio.
