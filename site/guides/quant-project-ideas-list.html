<script id="md" type="text/markdown"># Quant Project Ideas — 15 Projects Worth Building

A curated, opinionated list of quant projects — skewed toward the ones that actually teach you something and give you a tool you'll keep using. The seed for this list is a Twitter thread credited to @heidioftheeast with ideas like probability of backtest overfitting, Bayesian Black-Litterman, Ornstein-Uhlenbeck, and Kalman filters. I have expanded it with adjacent projects that round out a real quant portfolio, and ranked by build-value (difficulty × payoff × reusability across future work).

Each entry: **what it is → the math in one line → a canonical repo → difficulty → why build it → how it slots into your stack**.

Difficulty scale: 🟢 weekend · 🟡 1-2 weeks · 🟠 1 month · 🔴 multi-month

---

## Tier 1 — Must-build infrastructure

These aren't strategies; they're the *scaffolding* every quant portfolio needs. Build them first, use them forever.

### 1. Probability of Backtest Overfitting (PBO) 🟡

**What:** Lopez de Prado / Bailey / Borwein's framework for estimating how much of a backtested Sharpe is spurious. Uses Combinatorially Symmetric Cross-Validation (CSCV) to compute PBO, performance degradation, and related statistics (Probabilistic Sharpe Ratio, Minimum Track Record Length, Deflated Sharpe Ratio).

**Math:** Split your N-column return matrix of `N` strategy variants into `S` submatrices, enumerate all `C(S, S/2)` train/test splits, and compute the fraction of splits where the in-sample-best strategy underperforms median out-of-sample. That fraction is PBO.

**Repo:** [`esvhd/pypbo`](https://github.com/esvhd/pypbo) — reference Python implementation with PBO, PSR, MinTRL, DSR.

**Difficulty:** 🟡 1-2 weeks to understand and integrate.

**Why build it:** Because every backtest you'll ever run is at risk of being overfit and you currently have no number for how much. The difference between a strategy with PBO=0.10 and PBO=0.60 is the difference between "ship it" and "throw it out" — and without this you are guessing.

**Plugs into your stack:** Direct gate for the challenge-game tournament flow. Any ensemble that emerges from `/challenge-game` should pass a PBO check before promotion to paper-trading. Specifically the Phase 12 Oracle Commander finding (rolodex WR overfit) is the exact failure mode PBO detects. This is arguably the single highest-leverage tool on this whole list for you.

---

### 2. Walk-Forward + Purged K-Fold CV Harness 🟡

**What:** Cross-validation that respects time ordering and purges look-ahead leakage. Lopez de Prado's Purged K-Fold leaves a gap between train and test to prevent label leakage from overlapping samples.

**Math:** Standard K-fold but with an embargo: if sample `i` is in the test set and sample `j` in train shares any information window with `i`, drop `j`. Purging removes samples whose labels span the test period.

**Repo:** [`hudson-and-thames/mlfinlab`](https://github.com/hudson-and-thames/mlfinlab) — implements Purged K-Fold, Combinatorial Purged CV, and the rest of *Advances in Financial Machine Learning*.

**Difficulty:** 🟡 1-2 weeks.

**Why build it:** Regular sklearn cross-validation is subtly wrong for financial data. Purged K-Fold fixes it.

**Plugs into your stack:** Pair with PBO in the challenge-game validation gate. Use for all ML-layer training in Oracle Commander / Rolodex.

---

### 3. Research Infrastructure: bar sampling, labeling, feature engineering 🟠

**What:** Dollar bars instead of time bars, triple-barrier labeling, fractional differentiation for stationarity without losing memory. All from the first chapters of *Advances in Financial Machine Learning*.

**Math:** Dollar bars sample whenever cumulative traded dollar volume crosses a threshold (better sampling distribution than time bars). Triple-barrier labels each observation as +1/-1/0 depending on which horizon / SL / TP barrier hits first. Fractional differentiation: `(1 − L)^d` with non-integer `d` preserves long memory while achieving stationarity.

**Repo:** [`hudson-and-thames/mlfinlab`](https://github.com/hudson-and-thames/mlfinlab) (same).

**Difficulty:** 🟠 1 month to absorb end-to-end.

**Why build it:** Time-bar OHLCV is what every retail trader uses and every professional abandoned a decade ago. The research gap is real.

**Plugs into your stack:** Rebuild the trading-agent-team feature pipeline on dollar bars — the fast-cycler and graduated-TP strategies will almost certainly look different (and probably better) when fed cleaner inputs.

---

## Tier 2 — Classical quant strategies with real math

### 4. Ornstein-Uhlenbeck Pairs Trading 🟡

**What:** Fit an OU mean-reverting process to the spread between two cointegrated assets. Trade the spread when it deviates from its long-run mean. The classic stat-arb setup.

**Math:** OU process `dX_t = θ(μ − X_t) dt + σ dW_t`. Fit `θ, μ, σ` via maximum likelihood on the discretized residuals of a cointegrating regression `Y = α + β X + ε`. Trade when `|residual − μ| > k · σ`, exit at mean. Half-life of mean reversion is `ln(2) / θ`.

**Repo:** [`david-alber/Pairs-Trading-as-application-to-the-Ornstein-Uhlenbeck-Process`](https://github.com/david-alber/Pairs-Trading-as-application-to-the-Ornstein-Uhlenbeck-Process) and [`cantaro86/Financial-Models-Numerical-Methods`](https://github.com/cantaro86/Financial-Models-Numerical-Methods) (the OU notebook is particularly clean).

**Difficulty:** 🟡 1-2 weeks.

**Why build it:** It's the canonical example for learning how to turn a stochastic differential equation into a trading rule. After you've done it once, half the academic literature opens up.

**Plugs into your stack:** Crypto pairs (e.g., ETH/BTC perp spread, or HYPE/SOL correlation) are great OU candidates on Hyperliquid. Add as a new sub-strategy — uncorrelated with the directional fast-cyclers.

---

### 5. Kalman Filter Dynamic Hedge Ratio 🟡

**What:** Instead of fitting a *fixed* cointegration coefficient `β` from OLS, let `β` drift over time via a Kalman filter. Adapts pairs-trading to regime changes.

**Math:** State-space model where `β_t` is the latent state with a random walk prior, observation equation `y_t = β_t x_t + ε_t`. Standard Kalman update gives a time-varying posterior mean of `β_t` that adapts on every new observation.

**Repo:** [`msekatchev/kalman-filter-asset-prices`](https://github.com/msekatchev/kalman-filter-asset-prices) and [`QuantConnect/Research` Kalman Filter Based Pairs Trading notebook](https://github.com/QuantConnect/Research/blob/master/Analysis/02%20Kalman%20Filter%20Based%20Pairs%20Trading.ipynb).

**Difficulty:** 🟡 1-2 weeks.

**Why build it:** Kalman filters are one of the few pieces of math every practitioner uses and every textbook explains badly. Pairs trading is the clearest use case to actually grok them.

**Plugs into your stack:** Generalizes OU pairs from #4. Also useful as a *smoother* for any noisy signal — rolling Hawkes branching ratio, funding rate imbalance, OI momentum. The filter is a reusable primitive beyond pairs trading.

---

### 6. Bayesian Black-Litterman Portfolio Allocation 🟠

**What:** Black-Litterman blends market-implied equilibrium returns with the investor's subjective views into a posterior distribution of expected returns. The "Bayesian" version treats it properly as a conjugate-normal Bayesian update instead of the classical BL closed form, letting you express non-Gaussian views and uncertainty.

**Math:** Prior: `π ~ N(Π, τ Σ)` where `Π` is reverse-optimized from market weights. Views: `P μ = Q + ε, ε ~ N(0, Ω)`. Posterior: `μ | views ~ N(μ̂, Σ̂)` with

```
μ̂ = [(τΣ)⁻¹ + P' Ω⁻¹ P]⁻¹ [(τΣ)⁻¹ Π + P' Ω⁻¹ Q]
```

PyMC version lets you specify full posteriors on views.

**Repos:**
- Classical closed-form: [`robertmartin8/PyPortfolioOpt`](https://github.com/robertmartin8/PyPortfolioOpt) (cookbook notebook `4-Black-Litterman-Allocation.ipynb`)
- QuantEcon Bayesian notebook: [`quantecon-notebooks-python/black_litterman.ipynb`](https://github.com/QuantEcon/quantecon-notebooks-python/blob/master/black_litterman.ipynb)
- PyMC general: [`pymc-devs/pymc`](https://github.com/pymc-devs/pymc)

**Difficulty:** 🟠 1 month if you're doing the full Bayesian version in PyMC.

**Why build it:** It's the canonical way to combine a strategy's signal ("I think BTC has +5% expected return next week") with market-neutral portfolio math. Most retail approaches ignore covariance entirely; this teaches you to respect it.

**Plugs into your stack:** Position-sizing layer for the multi-coin trading-agent-team. Current approach is mostly equal-weight across 8 coins — BL would let each sub-strategy express its own "view" on a coin's expected return and the portfolio optimizer would blend them with the correlation matrix. Cleanest upgrade path to proper risk-parity allocation.

---

### 7. Deflated Sharpe Ratio + Probabilistic Sharpe Ratio 🟢

**What:** Already partially covered in #1 via pypbo, but worth doing as a standalone. PSR tells you the probability that an observed Sharpe is above a threshold; DSR corrects for multiple testing (how many strategies you tried before finding this one).

**Math:** PSR `= Φ[(SR̂ − SR*) · √(T − 1) / √(1 − γ_3 · SR̂ + (γ_4 − 1)/4 · SR̂²)]` where `γ_3, γ_4` are skew and kurtosis of returns. DSR replaces `SR*` with an effective threshold derived from the number of trials.

**Repo:** [`esvhd/pypbo`](https://github.com/esvhd/pypbo) ships PSR and DSR alongside PBO.

**Difficulty:** 🟢 weekend.

**Why build it:** Any time you report a Sharpe ratio without its confidence interval and multiple-testing correction, you're misleading yourself and anyone you show it to.

**Plugs into your stack:** Mandatory reporting field for every challenge-game tournament output.

---

## Tier 3 — Market microstructure

### 8. Avellaneda-Stoikov Market Maker 🟡

**What:** Closed-form optimal bid-ask quoting as a function of inventory, volatility, and risk aversion.

**Math:** See `avellaneda-stoikov-and-hawkes.md` for the full treatment. Reservation price `r = s − qγσ²(T−t)`, half-spread `= (γσ²(T−t) + (2/γ) ln(1 + γ/k)) / 2`.

**Repo:** [`fedecaccia/avellaneda-stoikov`](https://github.com/fedecaccia/avellaneda-stoikov) — cloned to `repos/avellaneda-stoikov/`.

**Difficulty:** 🟡 1-2 weeks (more to productionize).

**Why build it:** It's *the* canonical market-making model. Any future conversation about liquidity provision starts from here.

**Plugs into your stack:** Maker leg on Hyperliquid. Full integration story in `avellaneda-stoikov-and-hawkes.md`.

---

### 9. Hawkes Process Order Flow Model 🟠

**What:** Self-exciting point process fit to trade timestamps. Captures order-flow clustering, provides a regime detector via branching ratio, and gives a short-horizon intensity forecast.

**Math:** `λ(t) = μ + Σ_{t_i < t} α · exp(−β (t − t_i))`, stable iff `α/β < 1`.

**Repo:** [`x-datainitiative/tick`](https://github.com/x-datainitiative/tick) for fitting, [`jeremymck/High-Frequency-Data---Limit-Order-Books`](https://github.com/jeremymck/High-Frequency-Data---Limit-Order-Books) for education.

**Difficulty:** 🟠 1 month to do well (fitting is finicky, kernel choice matters).

**Why build it:** Because Poisson is wrong and everyone pretends otherwise. Hawkes is the simplest upgrade that actually describes real order flow.

**Plugs into your stack:** Regime filter + feature for the existing taker strategies. Full story in `avellaneda-stoikov-and-hawkes.md`.

---

### 10. Order Flow Imbalance (OFI) Signal 🟡

**What:** A single scalar computed from L2 order-book updates that predicts short-horizon price moves. Cont, Kukanov, Stoikov (2014) show OFI linearly predicts mid-price changes at ~1-10 second horizon with high R².

**Math:** `OFI_t = Σ (ΔBidSize_t · 1[ΔBid ≥ 0] − ΔAskSize_t · 1[ΔAsk ≤ 0])` — signed flow into bids minus flow into asks, over a short window. Aggregated at the top of book or across levels.

**Repo:** No single canonical Python repo; the arxiv paper *Forecasting high frequency order flow imbalance using Hawkes processes* has reference code. Easy to write from scratch in ~50 lines.

**Difficulty:** 🟡 1-2 weeks (including getting L2 data wired up).

**Why build it:** Highest-R² linear predictor of short-horizon price movement that you can compute without any ML. If you build nothing else in microstructure, build this.

**Plugs into your stack:** Direct input to Oracle Commander's coin-selection logic. Use `flowsurface` (in `agents:repos/flowsurface/`) as the L2 data source — it already speaks Hyperliquid.

---

## Tier 4 — Machine learning meets trading

### 11. Meta-labeling / Triple Barrier + Random Forest 🟠

**What:** Lopez de Prado's meta-labeling. A "primary" model (e.g., a simple trend signal) generates trade direction; a "secondary" ML model predicts whether to *take* each of those trades. The ML learns to filter false positives rather than predict price.

**Math:** Primary gives `side_t ∈ {-1, 0, +1}`. Triple-barrier assigns each primary signal a binary label: did it hit TP before SL? Secondary model (random forest, xgboost) learns `P(success | features)` and you gate trades at `P > threshold`.

**Repo:** [`hudson-and-thames/mlfinlab`](https://github.com/hudson-and-thames/mlfinlab) meta-labeling module.

**Difficulty:** 🟠 1 month.

**Why build it:** It's the ML approach to trading that actually works in practice, because it decouples the hard problem (direction prediction) from the easier problem (quality filtering).

**Plugs into your stack:** Direct upgrade path for the fast-cycler strategies. Current approach is rule-based entries; meta-label them with an RF trained on order-book and funding features to filter out the losers. Preserves the deterministic execution layer per your rule (rules execute, AI advises).

---

### 12. Regime Detection via Hidden Markov Models 🟡

**What:** Fit a 2-4 state HMM to returns and/or volatility and use the inferred state as a regime label (risk-on / risk-off / crisis). Gate strategies on regime.

**Math:** HMM with Gaussian emissions, Baum-Welch EM for fitting, Viterbi for state decoding. `hmmlearn` in Python is the standard library.

**Repo:** [`hmmlearn/hmmlearn`](https://github.com/hmmlearn/hmmlearn) plus many tutorial notebooks.

**Difficulty:** 🟡 1-2 weeks.

**Why build it:** The cleanest way to express "this strategy works in some regimes and not others" — which is true for *every* strategy.

**Plugs into your stack:** Meta-layer for the ensembles. Instead of running all 10 ensembles constantly, activate subsets by regime. Crisis state → halt entirely or switch to defensive.

---

### 13. CPCV + Backtest Pipeline 🟠

**What:** Combinatorial Purged Cross-Validation — generate many out-of-sample Sharpe paths from a single backtest and compute confidence intervals. Goes hand-in-hand with PBO.

**Math:** Generate `C(N, k)` combinations of test folds from `N` total groups, each leaving `k` folds out. Purge and embargo overlapping samples. Run the strategy on each combination. Get a distribution of OOS Sharpes, not a point estimate.

**Repo:** [`hudson-and-thames/mlfinlab`](https://github.com/hudson-and-thames/mlfinlab).

**Difficulty:** 🟠 1 month to integrate into an existing backtest framework.

**Why build it:** Gives you honest confidence intervals on a strategy's Sharpe. A strategy with mean Sharpe 1.5 and 5th percentile -0.2 is *very different* from one with mean 1.5 and 5th percentile 1.1, and a single backtest run cannot tell you which you have.

**Plugs into your stack:** Graduated-TP and Phase 12 validation: replace the single OOS split with CPCV to get a real confidence interval on the +98% uplift finding.

---

## Tier 5 — Ambitious projects

### 14. Limit Order Book Simulator + RL Agent 🔴

**What:** Build a high-fidelity LOB simulator driven by Hawkes-process order arrivals, then train a reinforcement learning agent (PPO or SAC) on top of it to make markets, execute optimal-execution schedules, or take directional positions.

**Math:** LOB state as MDP: agent observes book state + inventory + time, acts by placing/canceling orders, receives PnL reward. Transition dynamics driven by Hawkes simulations (so order flow is realistic). SAC is the go-to algorithm — see [`im1235/ISAC`](https://github.com/im1235/ISAC) for an AS+SAC implementation.

**Repo:** [`sohaibelkarmi/High-Frequency-Trading-Simulator`](https://github.com/sohaibelkarmi/High-Frequency-Trading-Simulator), [`javifalces/HFTFramework`](https://github.com/javifalces/HFTFramework), [`im1235/ISAC`](https://github.com/im1235/ISAC).

**Difficulty:** 🔴 multi-month.

**Why build it:** It's the modern HFT research stack. Also the clearest example of "RL for trading" that doesn't immediately overfit — the simulator is synthetic and the agent can be trained to convergence.

**Plugs into your stack:** Too big to plug in directly. Better as a pre-training environment for the maker-leg SAC agent in `avellaneda-stoikov-and-hawkes.md` idea #3.

---

### 15. Bitcoin On-Chain → Volatility Predictor 🔴

**What:** Transformer or LSTM predicting BTC realized volatility from on-chain features (exchange flows, whale wallets, miner behavior, stablecoin supply changes). Already exists as a reference project.

**Repo:** [`bitcoin_synthesizer`](https://github.com/search?q=bitcoin+synthesizer) — also referenced in your `agents:repos/bitcoin_synthesizer/`.

**Difficulty:** 🔴 multi-month.

**Why build it:** If it works, it's a direct feed for volatility-based sizing on every crypto strategy you run.

**Plugs into your stack:** Already in the trading-agent-team reference repo list. The integration is volatility-based sizing: scale down trade size when predicted vol spikes.

---

## Suggested build order (for you specifically)

If I were you and I wanted to spend the next 90 days leveling up the trading-agent-team, this is the order I'd tackle them:

1. **PBO (#1) + PSR/DSR (#7)** — 1 week. Single biggest quality gate you can add right now. Directly addresses the rolodex WR overfit finding.
2. **Purged K-Fold + CPCV (#2 + #13)** — 2 weeks. Gives honest confidence intervals on every existing strategy. The challenge-game outputs become trustworthy.
3. **OFI (#10)** — 1 week. Cheap win, high signal, uses data you already have via `flowsurface`.
4. **Kalman (#5) + OU Pairs (#4)** — 3 weeks. New sub-strategy, uncorrelated PnL, gateway drug to the rest of state-space modeling.
5. **Hawkes regime filter (#9)** — 3 weeks. Overlay on existing strategies. Low risk, high potential upside as a gating signal.
6. **Avellaneda-Stoikov maker (#8)** — 3 weeks. First maker leg on Hyperliquid, paired with Hawkes regime from step 5.
7. **Bayesian Black-Litterman (#6)** — 4 weeks. Finally unify sizing across the 8 coins and 10 ensembles under one portfolio optimizer.
8. **Meta-labeling (#11)** — 4 weeks. Quality filter for fast-cycler entries.

Skip or defer: the LOB simulator (#14) and on-chain volatility (#15) are both worth building eventually but neither has the payoff/complexity ratio to come first.

---

## Meta observation

The list above is ~80% infrastructure and ~20% strategy, and that ratio is correct. Most retail quant traders build 5 strategies and 0 infrastructure, then can't tell why anything works or fails. The professional inversion is: build the validation and measurement stack first, and the strategies compose themselves on top.

PBO, purged CV, CPCV, PSR/DSR, OFI, Kalman — these are *primitives*. You use them forever on every future project. OU pairs, AS market making, meta-labeling — these are *strategies*. Each one is finite and replaceable. Spend your learning budget on the primitives.
