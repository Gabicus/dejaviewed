<script id="md" type="text/markdown"># L1B3RT4S — Elder Plinius's Jailbreak Corpus (Defensive Research Notes)

**Repo:** https://github.com/elder-plinius/L1B3RT4S
**Local clone:** `/home/victor/Desktop/Projects/claude/ai-catalogs/repos/L1B3RT4S/`
**Stars / forks:** ~18.2k / ~2.2k
**License:** AGPL-3.0
**Maintainer:** Elder Plinius ("Pliny the Liberator") — probably the most visible independent LLM red-teamer on X/Twitter

> **Framing up front.** This guide is written from a defensive security research perspective. L1B3RT4S is the largest public, organized corpus of model-specific jailbreak prompts in existence. For anyone building on top of frontier LLMs — alignment researchers, platform trust-and-safety teams, guardrail vendors, application developers writing system prompts — it is the closest thing the community has to a "CVE database" for prompt injection and refusal-bypass patterns. The value of studying it is understanding *what classes of attack your model and your wrapper prompt need to survive*, not running any individual payload against a production system. This guide deliberately does **not** reproduce prompt content from the repo. If you want the raw text, clone it and read it under whatever policy your organization has for possessing adversarial material.

---

## What it is

L1B3RT4S is a continuously updated, community-followed archive of "liberation prompts" — prompts designed to push LLMs past their RLHF-imposed refusal behavior, content filters, system prompt constraints, and tool-use guardrails. Plinius has been publishing live jailbreaks of every major frontier release (often within hours of launch) since 2023, and this repo is where the canonical versions land.

It is not a tutorial, not a framework, not a toolkit. It is a flat directory of Markdown-ish files (`.mkd` extension) organized by target vendor. Each file is a scrapbook — commentary, dated entries, tagged payloads, screenshots-as-links, shortcut references, and snapshots of system prompts that have leaked from various products.

The repo matters for three reasons:

1. **Taxonomy.** It's one of the few places where you can see attack patterns sorted by target, so you can ask "what has actually worked against Claude 3.5 / 4 / 4.5 in the wild" instead of reading disconnected tweets.
2. **Recency.** Frontier labs ship new models monthly. Plinius tends to post a working jailbreak for every major release on day one. The repo is a rolling record of how long each generation's alignment holds up.
3. **Public accountability.** Because it is public, Anthropic, OpenAI, Google, xAI, Meta, and the rest all monitor it. Several known model hardening rounds have clearly been influenced by patterns it surfaced.

## How it works (as a corpus, not as an attack)

### Directory structure

After cloning, the repo is a flat list of roughly 40 files. Examples observed in the current tree:

```
ANTHROPIC.mkd        OPENAI.mkd          GOOGLE.mkd
META.mkd             MISTRAL.mkd         DEEPSEEK.mkd
XAI.mkd              GROK-MEGA.mkd       PERPLEXITY.mkd
MICROSOFT.mkd        APPLE.mkd           AMAZON.mkd
ALIBABA.mkd          COHERE.mkd          NVIDIA.mkd
MOONSHOT.mkd         INFLECTION.mkd      REKA.mkd
NOUS.mkd             LIQUIDAI.mkd        ZYPHRA.mkd
CURSOR.mkd           WINDSURF.mkd        MIDJOURNEY.mkd
CHATGPT.mkd          MULTION.mkd         FETCHAI.mkd
HUME.mkd             GRAYSWAN.mkd        REFLECTION.mkd
BRAVE.mkd            INCEPTION.mkd       ZAI.mkd
-MISCELLANEOUS-.mkd  SYSTEMPROMPTS.mkd   1337.mkd
AAA.mkd              TOKEN80M8.mkd       TOKENADE.mkd
#MOTHERLOAD.txt      !SHORTCUTS.json     *SPECIAL_TOKENS.json
README.md            LICENSE
```

A few observations that are themselves *signal* for defenders, independent of the prompt content:

- **Vendor files are versioned by model.** The Anthropic and OpenAI files are the longest and get new dated entries per release. If you are tracking "which release introduced/fixed which refusal regression," this is a free changelog.
- **`SYSTEMPROMPTS.mkd`** is a separate collection of *leaked system prompts* from deployed products. This is the single most useful file in the repo for a builder: it is a living example of how *not* to write a system prompt, and what state-of-the-art production prompts from major labs actually look like once someone extracted them.
- **`*SPECIAL_TOKENS.json`** catalogs control tokens per tokenizer family (e.g., `<|im_start|>`, `<|endoftext|>`-style sentinels, Anthropic's turn markers, etc.). Knowing which tokens your model treats as structural is essential for writing a parser/sanitizer for untrusted input.
- **`!SHORTCUTS.json`** is a registry of named aliases that Plinius's Discord community uses to refer to recurring payload families. Treat this as a rough taxonomy — a way to name classes of attack so you can reason about them.
- **`#MOTHERLOAD.txt`** is a "greatest hits" file. For defensive review, it is a concentrated sample of the patterns that have historically generalized across vendors.

### The "freedom prompt" / universal template pattern

The signature Plinius contribution is not any single payload — it is the observation that a relatively small set of *structural moves* generalize across most models. Without reproducing any specific wording, the families you will see recur across every vendor file are roughly:

- **Role/frame inversion** — convincing the model it is operating in a context where its normal refusal policy does not apply (e.g., a fictional simulation, a developer/debug mode, an alternate persona, a "liberated" counterpart).
- **Policy-puppeteering** — asking the model to output its "policy" or "guidelines," then asking it to rewrite them, then asking it to act under the rewritten version.
- **Output-format coercion** — demanding a rigid output scaffold (leetspeak, Markdown tables, JSON with specific keys, reversed text, Base64) so that the refusal classifier — which is often trained on natural-language refusals — fails to fire on the coerced format.
- **Multi-turn priming / context flooding** — burying the ask inside a long, benign-looking context so that refusal salience is diluted.
- **Tool-context exploits** — in agentic and IDE-integrated products (Cursor, Windsurf, browsing agents), hiding instructions inside content the model is asked to read/summarize/refactor rather than inside the user turn. This is classic indirect prompt injection.
- **Token-level tricks** — using special/control tokens, invisible Unicode, homoglyphs, and tokenizer quirks to smuggle directives past input filters that operate on the decoded string.
- **Authority spoofing** — impersonating the system prompt, the operator, or an internal developer tool, sometimes by mimicking the model's own turn delimiters.

These seven patterns are a useful mental checklist. If your application's system prompt and input-validation layer do not have a considered answer for each one, you have work to do.

### What "success rates" look like

The repo does not publish rigorous benchmarks. Success is reported anecdotally, per release, with dates. For a structured view, pair the repo with:

- **HarmBench** (UC Berkeley / CAIS) — standardized adversarial benchmarks.
- **JailbreakBench** — reproducible evaluation harness.
- **Anthropic's published red-teaming reports** and **OpenAI's system cards** — which increasingly acknowledge specific classes of Plinius-style attacks.
- **MITRE ATLAS** — the closest thing to a MITRE-ATT&CK for ML systems; most Plinius patterns map cleanly to ATLAS techniques.

L1B3RT4S is the *corpus*. The benchmarks above are the *measurement*. You want both.

---

## Key mechanics for defenders

If you are building on top of a frontier model and wondering what to actually *do* with this corpus, here is the defensive reading order:

1. **Start with `SYSTEMPROMPTS.mkd`.** Read the leaked prompts from deployed products. Note how much defensive scaffolding (role assertions, refusal reinforcement, output constraints, tool-use guards) the big labs bake in — and note where those defenses still failed. Use it as a negative example library for your own system prompt.
2. **Read the vendor file for the model you actually ship on.** Not to copy attacks, but to see which classes your vendor is weakest against. If you ship on Claude, the `ANTHROPIC.mkd` file is essentially a public list of the refusal patterns Anthropic has been patching over time.
3. **Write a threat model per pattern family.** For each of the seven families above, answer: "What does my application do when this hits the user turn? The tool-call return value? The system prompt? Documents I retrieve?"
4. **Separate untrusted input channels.** The single most important architectural move: never let retrieved content, tool outputs, or user-uploaded files share a channel with your trusted system prompt. Use dedicated delimiters, structured tool schemas, and — if your stack supports it — Anthropic's / OpenAI's newer "input classification" or "context isolation" features.
5. **Assume tokenization ≠ string equality.** Validate inputs at the token level, not just the character level. Special tokens and homoglyphs round-trip badly through naive sanitizers.
6. **Build a regression suite.** Pick ~20 representative patterns (again, families, not specific strings), abstract them into parameterized test cases, and run them against your prompt + guardrails in CI. When a new model version ships, rerun.
7. **Monitor in production.** Classifier-based prompt-injection detectors (Lakera, Protect AI, NVIDIA NeMo Guardrails, plus the built-in Anthropic / OpenAI moderation endpoints) catch a surprising fraction of the common families. None catch everything; layered defenses are the only serious posture.

### What the corpus reveals about alignment weaknesses

Stepping back, the pattern across three years of Plinius releases is consistent and worth internalizing:

- **RLHF refusal is a surface-level behavior, not a capability gate.** Models still "know" the information; refusal is a learned habit that can be talked out of. This is why "framing" attacks keep working even after each patch.
- **The model cannot reliably distinguish its operator from its user.** This is the root cause of indirect prompt injection. It is not yet fully solved by any production model.
- **Long context dilutes safety training.** Attacks that would fail in a short prompt succeed when embedded in 50k tokens of plausible-looking context.
- **Multi-modal widens the attack surface.** Images and audio carry instructions that text filters never see.
- **Agent loops compound.** Each additional tool call is another chance for untrusted content to re-enter the model. Agent products (Cursor, Windsurf, browsing agents) are currently the softest targets.

None of this is news to the alignment teams at the labs — but having a public, organized corpus makes it a lot harder to pretend any of it is solved.

**Handling guidance.** Treat the local clone like you would treat any other adversarial research corpus: keep it out of training data, out of RAG indexes, out of anything a downstream model could be asked to summarize, and out of public repos. Do not paste content from it into shared chats or tickets without a clear defensive research purpose. Do not use it to probe systems you do not own or have written authorization to test.

## What we could build with it (defensive research)

- **Prompt-injection regression harness.** A CI test that takes your application's system prompt, runs an abstracted subset of the L1B3RT4S pattern families against it on every model upgrade, and fails the build if refusal regressions appear. This is the single highest-leverage use.
- **Classifier training set.** If you are training or fine-tuning a prompt-injection detector, the family taxonomy in L1B3RT4S plus HarmBench / JailbreakBench gives you a more realistic positive class than the synthetic attack datasets most detectors ship with.
- **System prompt hardening review.** A skill (or agent) that reads your system prompt and scores it against the seven pattern families, recommending specific defensive additions (role reassertion, output constraints, tool-use guards, delimiter hygiene).
- **Model changelog tracker.** Cross-reference dated entries in the vendor files against frontier model release dates. Produces a rough "time-to-first-jailbreak" and "time-to-patch" metric per vendor — genuinely useful procurement signal.
- **Ethics / governance artifact.** If you are writing a responsible-AI policy for an org, L1B3RT4S is a concrete, public counterexample to "our vendor handles safety for us." Use it to justify budget for an internal red team.
- **Cross-reference with MITRE ATLAS.** Build a mapping table from Plinius's informal pattern names (via `!SHORTCUTS.json`) to formal ATLAS technique IDs. Nobody has done this publicly yet; it would be a useful contribution.

---

## Ethical framing

This repo exists because the people who build frontier models have not yet solved prompt injection, and because the community of researchers who study that failure mode needs a shared artifact to reason about. Cataloging it here is an act of defensive research: knowing what attacks look like in organized form is how builders of LLM-powered products write better system prompts, how trust-and-safety teams prioritize their roadmap, and how alignment researchers measure progress between model generations. Using it to extract harmful content from production systems you do not own is both illegal and a waste of the corpus's real value. Treat it the way a security engineer treats exploit-db: read it, learn from it, harden against it, and never run it at something you are not authorized to.
