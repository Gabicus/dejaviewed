## Thesis

Game theory isn't abstract math — it's the operating system behind every AI product decision, every market move, and every platform play. The entries in this collection reveal the incentive structures hiding in plain sight.

---

## Why it matters

The game-theory collection is new and small but punches above its weight. Elon's $1 is a masterclass in incentive design — the trap is always in the commitment structure, not the headline number. Combined with the AI origin story (decades of academic game theory producing today's landscape) and the physics-as-strategy entries, this collection reveals that every major decision has a game-theoretic structure. Understanding it is the difference between being a player and being played.
