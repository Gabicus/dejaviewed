<script id="md" type="text/markdown"># Onyx — Self-Hosted Open-Source ChatGPT / Claude Replacement

**GitHub:** https://github.com/onyx-dot-app/onyx
**Stars:** ~26,100
**License:** MIT (Community Edition); Enterprise Edition is source-available with paid add-ons
**Stack:** Python (~63%), TypeScript (~31%), Go (~2%)
**Repo path:** `repos/onyx/` (clone pending — sandbox blocked git clone in this session; run `git clone https://github.com/onyx-dot-app/onyx.git repos/onyx` manually)

---

## What it is

Onyx (formerly Danswer) is the most mature open-source "ChatGPT for your company" you can actually self-host in a weekend. It's a full application layer on top of LLMs that ships with:

- A polished chat UI (multi-user, rooms, saved chats, custom personas)
- Agentic RAG over your own documents with hybrid vector + keyword indexing
- 50+ first-party connectors that crawl SaaS tools (Slack, Notion, Google Drive, Confluence, Jira, Gmail, GitHub, Salesforce, etc.) and keep them synced
- Pluggable LLM backends — Anthropic, OpenAI, Gemini, OR fully local via Ollama / vLLM / LiteLLM
- Deep Research mode (ranked top on their internal leaderboard as of early 2026)
- Web search, code execution sandboxes, voice mode, image generation, MCP actions
- Custom Agents ("Assistants") with configurable instructions, tools, and knowledge scopes

It's basically the piece of infrastructure you'd build yourself if you wanted a personal/team knowledge layer that indexes everything you touch and lets an LLM agent search, reason, and act across it — but someone already built it, productized it, and open-sourced the core under MIT.

## How it works

Onyx is a classic modern RAG stack, but thoughtfully assembled:

**Ingestion layer**
- Connectors are Python modules that pull documents from sources on a schedule
- Each document gets chunked, cleaned, metadata-enriched, and embedded
- Embeddings are stored in a Vespa-based vector + keyword hybrid index (they previously used Typesense/others; Vespa is the current default)
- Access-control metadata is tracked per-document so permission boundaries are respected at query time

**Query layer**
- User query goes through an agentic planner (the "agent search" loop)
- Planner can decompose the question, run multiple sub-retrievals, chain web search + internal RAG, execute code in a sandbox, and call tools/MCP actions
- Retrieved chunks are reranked, filtered by permissions, and stuffed into the LLM prompt with citations
- The LLM backend is whatever you configure — cloud (Anthropic/OpenAI/Gemini) or local (Ollama/vLLM)

**Infrastructure**
- **Postgres** for metadata, users, chat history
- **Vespa** (default) for the hybrid search index
- **Redis** for caching and rate limiting
- **Celery** workers for background jobs (indexing, connector syncs, reranking)
- **MinIO** (S3-compatible) for blob storage (uploaded files, attachments)
- **Model servers** — separate containers that run embedding + reranker + optional local LLM
- **Nginx** in front of the Next.js frontend and FastAPI backend

There's a **Lite mode** that strips the heavy search stack and runs as just a chat UI with BYO LLM, fitting in under 1 GB RAM. That's the right starting point if you just want "ChatGPT UI for my local Ollama" and will add RAG later.

## Connectors (highlights)

Onyx ships with 50+ connectors; the commonly useful ones for a personal/power-user setup:

- **Knowledge & docs:** Notion, Confluence, Google Drive, Dropbox, Box, OneDrive, S3, local file upload, generic web crawler, sitemap
- **Chat & communication:** Slack, Discord, Microsoft Teams, Gmail, Outlook
- **Dev tools:** GitHub, GitLab, Bitbucket, Jira, Linear, Asana, ClickUp, Productboard
- **CRM / support:** Salesforce, HubSpot, Zendesk, Freshdesk, Intercom, Gong
- **Databases / BI:** Airtable, Mixpanel, generic SQL, Google Sheets
- **Media / code:** YouTube transcripts, ReadTheDocs, Sharepoint, Axero
- **Generic:** Requests-based web crawler, file upload, MCP actions for everything else

Each connector handles auth (OAuth, API key, service account), incremental sync, deletion propagation, and ACL metadata.

## LLM backend options

Onyx doesn't lock you in:

- **Cloud:** Anthropic (Claude family), OpenAI (GPT-4/5), Google Gemini, Azure OpenAI, AWS Bedrock
- **Self-hosted:** Ollama (easy), vLLM (fast, GPU-hungry), LiteLLM proxy (universal adapter)
- **Embeddings:** Defaults to a local sentence-transformers model running in a sidecar; can swap for OpenAI/Cohere/Voyage
- **Rerankers:** Local cross-encoder or hosted (Cohere Rerank)

You can mix: cheap local embeddings + Claude for final synthesis is a great config. Routing per-assistant is supported — one assistant uses Claude, another uses a local Mistral.

## System requirements

**Full Onyx (production / power user):**
- Docker + Docker Compose
- 16 GB RAM minimum (32 GB recommended once you turn on reranker + local embedding)
- ~20 GB disk for the stack + whatever your document corpus demands
- GPU optional — only needed if you want a local LLM via vLLM. Embeddings are CPU-fine.

**Lite mode:**
- Docker + Compose
- ~1 GB RAM
- Any BYO LLM endpoint

**OS:** Linux is the blessed path; macOS/Windows via Docker Desktop works but is heavier.

## Quick start (Docker self-host)

```bash
git clone https://github.com/onyx-dot-app/onyx.git
cd onyx/deployment/docker_compose

# Copy and edit env vars (at minimum: set an LLM provider key
# or point GEN_AI_API_ENDPOINT at your Ollama)
cp .env.template .env
$EDITOR .env

# Boot the full stack
docker compose -f docker-compose.dev.yml up -d

# Wait ~2 minutes for model servers and Vespa to warm up
# Then hit http://localhost:3000 and create the admin account
```

Key env vars to know:
- `AUTH_TYPE` — `disabled` / `basic` / `google_oauth` / `oidc`
- `GEN_AI_MODEL_PROVIDER` and matching API key — or point at a local endpoint
- `INDEX_BATCH_SIZE` — tune for your RAM
- `POSTGRES_*`, `VESPA_*`, `REDIS_*` — default internal containers work fine

For Lite mode:

```bash
cd onyx/deployment/docker_compose
docker compose -f docker-compose.lite.yml up -d
```

For Kubernetes/Helm/Terraform there are official charts in `deployment/kubernetes/` and `deployment/helm/` — Onyx is genuinely production-ready if you want to run it for a team.

## Gotchas

- **Vespa is a memory hog.** Budget 4-8 GB just for the index container on a real corpus. The Lite stack avoids this.
- **First-time indexing is slow.** Connectors run on a schedule; kick them manually from the admin UI the first time and go make coffee.
- **Embeddings model download.** First boot pulls the sentence-transformers model — don't panic when the model server takes 3 minutes to come up.
- **Enterprise feature fences.** Some advanced features (SSO variations, SCIM, advanced RBAC, some analytics) are gated behind the Enterprise Edition. The free MIT Community Edition is still excellent.
- **LLM cost on cloud backends.** Deep Research + agentic search can make lots of LLM calls per question. Cap it with a local model or rate limits if cost is a concern.
- **Auth-by-default in dev.** Set `AUTH_TYPE=disabled` for local single-user; otherwise you're creating admin accounts every reset.

## How Victor could self-host it as a personal knowledge layer

The right use case for Onyx in Victor's stack isn't "replace Claude Code" — it's **become the permanent index and chat layer over everything that isn't code**. Claude Code handles the coding loop; Onyx becomes the searchable memory of everything else.

A realistic personal setup:

1. **Run Onyx full stack on the dev box or a small home server** (16 GB RAM, Docker Compose). Put it behind Tailscale or Cloudflare Tunnel so it's reachable from anywhere without exposing ports.
2. **Connect the sources that matter:**
   - Local file connector pointed at `~/Desktop/Projects/claude/` (all the project notes, markdown, guides, MEMORY.md files)
   - GitHub connector on Victor's repos (Unicron, trading-agent-team, ai-catalogs, ai3-resources)
   - Notion / Google Drive if anything lives there
   - Gmail if you want the chat agent to search email
   - YouTube transcripts for channels you study
3. **LLM backend: Claude via API** for the chat/reasoning, **local sentence-transformers for embeddings** (free, good enough). Optionally add Gemini as a second provider for the cost sensitive Deep Research mode.
4. **Create Assistants per domain:**
   - "Trading Research" — scoped to trading-agent-team + strategy repos + crypto guides
   - "Unicron Engineer" — scoped to unicron repo + legion-command docs
   - "Design System" — scoped to ai-catalogs + frontend-design references
   - "Personal Memory" — scoped to MEMORY.md + session transcripts
5. **Point Claude Code at Onyx via MCP.** Onyx exposes an MCP server; add it to `~/.claude/settings.json` so Claude Code can query your personal knowledge base mid-coding-session. This is the real unlock: agentic RAG across your entire second brain, on tap, inside Claude Code.
6. **Schedule connector syncs** so the index stays fresh without thinking about it.

Onyx effectively becomes a persistent, queryable, permissioned superset of `MEMORY.md` and the knowledge flywheel — with a UI, multi-user support, and the ability to pull in sources way beyond what you'd manually curate.

## What we could build with it

- **Personal research assistant** that has read every one of Victor's guides, post-mortems, trading notes, and project docs — queryable in natural language with citations
- **Trading intelligence hub** — index strategy papers, post-mortems, ensemble results, challenge-game leaderboards; ask "what did we learn about pyramiding" and get a cited answer
- **Team/collaborator portal** — if Victor ever onboards anyone into Unicron or the trading work, Onyx becomes the zero-effort knowledge handoff
- **MCP bridge** — expose Onyx as an MCP server to Claude Code so every session starts with full access to your second brain without manual context injection
- **Deep Research over private data** — run Onyx's agent loop on your own corpus, not the public web, for post-mortems and strategy reviews
- **Voice-mode memory chat** — use Onyx's voice UI for hands-free "what do we know about X" queries while coding
- **Permissioned sharing** — if you ever publish part of the knowledge base, ACL-aware retrieval means public and private sources can coexist in the same chat

## Bottom line

Onyx is the rare self-hosted project where the docker-compose actually works, the connector list is deep, and the agent layer is genuinely modern. It's the right tool to become Victor's persistent personal knowledge layer — indexing everything, queryable by Claude Code via MCP, surviving across sessions. The cost is 16 GB of RAM and an afternoon of setup. Very high-leverage install.
