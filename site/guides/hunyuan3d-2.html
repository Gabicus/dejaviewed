<script id="md" type="text/markdown"># Hunyuan3D-2 — Tencent's Open Image-to-3D Mesh Generator

**GitHub:** https://github.com/Tencent-Hunyuan/Hunyuan3D-2
**Latest:** Hunyuan3D-2.1 (PBR, production-ready materials) — https://github.com/Tencent-Hunyuan/Hunyuan3D-2.1
**License:** Tencent Hunyuan Community License (open weights, some commercial restrictions for very large companies)
**Repo status:** Not cloned locally — the code is small (a few hundred MB) but model weights are 50 GB+ and are best pulled on demand from Hugging Face (`tencent/Hunyuan3D-2` and `tencent/Hunyuan3D-2.1`). Clone only when you're ready to run it.

---

## What it is

Hunyuan3D-2 is Tencent's open-source two-stage 3D asset generator. Feed it a single image and it returns a watertight 3D mesh with a textured (optionally PBR) surface, ready to drop into Blender, Unity, Unreal, or any standard DCC pipeline. It is the largest and most capable openly released image-to-3D model as of this writing, and it's the missing piece that has a companion: **HY-Motion** (Tencent's text-to-motion model), available at `~/projects/ai3-resources/repos/HY-Motion-1.0/`. Together they form a near-complete text → 3D character → animation pipeline (more on this below).

The release is actually a family of models, not a single checkpoint. There's a shape generator that hallucinates geometry from the image, a texture generator that paints the bare mesh, "Turbo" and "Fast" distilled variants for speed, a 600M "mini" variant for low-VRAM setups, and a multiview variant that takes 2–4 views of the same object for much better back/side reconstruction. Version 2.1 adds a full PBR texture stack (albedo / metallic-roughness / normal) so the outputs drop straight into a modern render engine without manual material fixup.

It is important to note: **Hunyuan3D-2 is image-to-3D only.** It does not natively read text prompts. The text-to-3D workflow everyone uses is "text → SDXL/Flux image → Hunyuan3D-2 mesh," which is what Tencent's own demos do internally. If you want single-call text-to-3D with open weights, this is not that tool — use Trellis or Tripo's hosted API for that (see `guides/blender-mcp-tripo-pipeline.md`).

---

## How it works under the hood

**Stage 1 — Shape generation (Hunyuan3D-DiT).** A diffusion transformer operating in a latent 3D representation. The input image is encoded by a DINOv2-style vision encoder; the DiT denoises a latent volume conditioned on those features; a VAE decoder reconstructs an SDF (signed distance field) which is marched to a triangle mesh. The model was trained on tens of millions of 3D assets with rendered multiview supervision.

- `Hunyuan3D-DiT-v2-0` — 1.1B params, standard quality
- `Hunyuan3D-DiT-v2-0-Fast` — 1.1B, guidance-distilled (fewer CFG steps)
- `Hunyuan3D-DiT-v2-0-Turbo` — 1.1B, step-distilled (6–8 steps vs 50)
- `Hunyuan3D-DiT-v2-mini` — 0.6B, low-VRAM variant
- `Hunyuan3D-DiT-v2-mv` — 1.1B multiview — feed 2–4 images of the same object
- `Hunyuan3D-DiT-v2-1` — 3.0B, v2.1 release with new VAE and PBR-aware geometry

**Stage 2 — Texture generation (Hunyuan3D-Paint).** A multi-view diffusion model that paints the bare mesh. It renders the mesh from 6+ canonical viewpoints, diffuses textures on each view jointly (with cross-view attention for consistency), then bakes them back into a UV atlas. v2.1's Paint model outputs a full PBR set.

- `Hunyuan3D-Paint-v2-0` — 1.3B standard
- `Hunyuan3D-Paint-v2-0-Turbo` — 1.3B distilled
- v2.1 Paint — adds albedo / metallic-roughness / normal outputs

Output is always a `trimesh.Trimesh` object, which you can export as **GLB, OBJ, PLY, STL, FBX** — anything trimesh supports. GLB is the recommended default since it embeds textures and PBR materials in one file.

---

## System requirements

Be honest with yourself about VRAM. This is a big model.

**Hunyuan3D-2.0:**
- Shape only: **6 GB VRAM** (mini) to ~10 GB (DiT-v2-0)
- Shape + texture: **16 GB VRAM** total
- Fits on a single 3090, 4080, or 4090 comfortably. A 12 GB 3060 can run shape-only or the mini variant.

**Hunyuan3D-2.1 (PBR):**
- Shape only: **10 GB VRAM**
- Texture only: **21 GB VRAM**
- Shape + texture together: **29 GB VRAM**
- You want a **4090, A6000, or better** for the full 2.1 pipeline. A single 24 GB card can do 2.1 shape + 2.0 texture as a hybrid.

**Disk:** model weights are ~50 GB across shape + texture for v2.1. Keep them on an NVMe — loading is I/O bound.

**Software:** Python 3.10+, PyTorch 2.1+ with CUDA 11.8 or 12.1, a C++ toolchain for the custom rasterizer/renderer. Linux is the happy path; Windows works via WSL2 or YanWenKun's WinPortable build (https://github.com/YanWenKun/Hunyuan3D-2-WinPortable). macOS works for shape only via MPS — texture gen is effectively CPU-bound and unbearably slow. There's also a GPU-poor fork at https://github.com/deepbeepmeep/Hunyuan3D-2GP that offloads aggressively for 8 GB cards.

---

## Quick start

```bash
# clone code (small)
cd ~/projects/ai-catalogs/repos/
git clone https://github.com/Tencent-Hunyuan/Hunyuan3D-2.git
cd Hunyuan3D-2

# python env
python -m venv .venv && source .venv/bin/activate
pip install torch==2.3.0 torchvision --index-url https://download.pytorch.org/whl/cu121
pip install -r requirements.txt
pip install -e .

# build the custom rasterizer + renderer (required for texture gen)
cd hy3dgen/texgen/custom_rasterizer && python setup.py install && cd ../../..
cd hy3dgen/texgen/differentiable_renderer && python setup.py install && cd ../../..

# weights auto-download from HF on first run; or preload:
huggingface-cli download tencent/Hunyuan3D-2 --local-dir ./weights
```

Minimal image-to-mesh script:

```python
from hy3dgen.shapegen import Hunyuan3DDiTFlowMatchingPipeline
from hy3dgen.texgen import Hunyuan3DPaintPipeline
from PIL import Image

img = Image.open("reference.png")

shape_pipe = Hunyuan3DDiTFlowMatchingPipeline.from_pretrained("tencent/Hunyuan3D-2")
mesh = shape_pipe(image=img)[0]          # trimesh.Trimesh
mesh.export("bare.glb")

paint_pipe = Hunyuan3DPaintPipeline.from_pretrained("tencent/Hunyuan3D-2")
textured = paint_pipe(mesh, image=img)
textured.export("final.glb")
```

For the Turbo variants, swap the pretrained name to `tencent/Hunyuan3D-2/hunyuan3d-dit-v2-0-turbo` and drop inference steps to 6. For v2.1 with PBR, use `tencent/Hunyuan3D-2.1`.

There is also a Gradio app (`python app.py`), an API server (`python api_server.py`), and a ComfyUI integration documented at https://docs.comfy.org/tutorials/3d/hunyuan3D-2 — ComfyUI is the path of least resistance if you already use it for SDXL/Flux work.

---

## How image-to-mesh differs from text-to-mesh

Text-to-3D tools (Shap-E, Point-E, early DreamFusion) hallucinate geometry from a text prompt alone. They're fast but vague — "a red sports car" gives you something car-shaped but generic and blurry. Image-to-3D is the dominant paradigm now because it cleanly separates concerns: let a mature 2D generator (SDXL, Flux, Midjourney) handle creative ideation and composition, then let a specialist 3D model do what it's good at — recovering geometry from pixels it can see.

Concretely with Hunyuan3D-2:
- **Better silhouette lock.** The reference image pins the silhouette exactly, so the mesh matches what you designed.
- **Style transfers cleanly.** The texture stage paints the mesh using the reference image as conditioning, so a stylized anime ref produces a stylized mesh, not a photoreal one.
- **Front-bias problem.** Single-view input means the back of the object is a hallucination. Use the **mv (multiview)** variant with 2–4 orthogonal views if you care about the back — it's the single biggest quality unlock.
- **Workflow cost.** You pay a 2D generation step upfront. Worth it. A Flux image → Hunyuan3D-2 mesh takes ~30 s on a 4090 and beats any pure text-to-3D open model.

---

## Integration with HY-Motion — the full pipeline

If you have HY-Motion cloned at `~/projects/ai3-resources/repos/HY-Motion-1.0/`. HY-Motion generates SMPL-X skeletal motion from text ("a character doing a backflip"). Hunyuan3D-2 generates a static character mesh from an image. Chained, you get:

1. **Text prompt** → Flux/SDXL → character reference image
2. **Character image** → Hunyuan3D-2 (mv variant for quality) → textured GLB
3. **Auto-rig** → Mixamo auto-rigger, Blender's Rigify, or Meshy's auto-rig endpoint
4. **Motion prompt** → HY-Motion → SMPL-X animation
5. **Retarget** → Blender (use the Rokoko or Auto-Rig Pro retargeter) → final animated character
6. **Render** → Blender Eevee/Cycles, or export FBX to Unity/Unreal

The weak link in this chain is step 3 (auto-rigging). Hunyuan3D-2 doesn't output rigs. Mixamo works for humanoid bipeds, breaks on anything else. For non-humanoid creatures you'll need manual rigging or a tool like AnythingWorld.

This is a genuinely powerful pipeline for indie game devs, VTuber creators, and previs artists. No existing commercial product bundles it this way.

---

## What we could build with it

- **Character asset factory** — prompt → Flux → Hunyuan3D-2 → Mixamo → Unity prefab, fully scripted
- **Reference-to-mesh for concept artists** — sketch on iPad, Hunyuan3D mesh on your desk in 60s
- **Game jam asset pipeline** — generate 20 enemies in an hour for a prototype
- **Photogrammetry replacement for flat objects** — a single photo of a coin, a leaf, a toy, becomes a usable mesh
- **Product visualization** — take a product photo, get a spinnable 3D model for an ecommerce site
- **AR tryable objects** — generate → export GLB → drop into a model-viewer web page with USDZ for iOS Quick Look
- **Full text-to-animated-character pipeline** — combined with HY-Motion (see above), this is a research-grade creative tool that would be a paid SaaS from anyone else
- **Blender MCP driver** — Hunyuan3D-2 is exposed as a tool inside the blender-mcp server (see `guides/blender-mcp-tripo-pipeline.md`), so Claude Code can generate a mesh and import it into Blender in one turn
