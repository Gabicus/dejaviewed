<script id="md" type="text/markdown"># Polymarket 99c Limit Order Arbitrage — Scalping the Resolution Tail

There's a specific, dumb, beautiful trade on Polymarket: post resting 99¢ bids on contracts that are almost certainly going to resolve to $1. When someone panics, needs liquidity, or fat-fingers a market sell, you eat their order at 99¢, wait a day or two, and collect $1. One cent of edge times 30-50 basis points of fee drag nets ~0.5% per cycle — but the cycles are short, the risk is well-characterized, and the capital turnover is extreme.

This is not alpha in the "predict the future" sense. It is **liquidity provision at the tail of a binary distribution**. The edge is structural.

---

## 1. What it is

Polymarket contracts are binary — they resolve to either $1 (YES wins) or $0 (NO wins). In the hours and days before resolution, many contracts have a near-certain outcome. A political contract where the result is already declared but not yet resolved. A sports contract past the final whistle. A weather contract where the day's high has already been printed. The "true" price is $1, but the order book has people selling at 98, 97, 96 for various reasons: exit-to-redeploy, position-close, loss-harvesting, or panic.

The trade: post resting limit buy orders at 99¢ (or 98, 97 laddered) and let liquidity takers hit you. When the contract resolves, you redeem for $1.

---

## 2. How it works — the mechanics

### Polymarket's order book

Polymarket runs a CLOB (Central Limit Order Book) on Polygon. Orders are signed messages held off-chain; fills settle on-chain via the Conditional Tokens Framework (CTF). Key facts:

- **Price range:** $0.01 to $0.99 (you cannot post at $1.00 exactly).
- **Tick size:** $0.01 on most markets, sometimes $0.001.
- **Fees:** scale as `min(price, 1 − price) * fee_rate`. At $0.99, your effective fee is based on 0.01 — essentially free. This is the *critical* mechanical reason the strategy is even possible.
- **Settlement:** When a market resolves YES, holders of YES tokens can redeem 1:1 for USDC. NO tokens burn. Redemption is permissionless and instant after resolution.
- **Merging:** You can also merge YES + NO tokens at any time into 1 USDC via the CTF contract, which is the other exit path.

### Why resting 99¢ bids get filled

Even on a contract "everyone knows" will resolve YES, sellers show up because:

1. **Capital rotation.** Someone with a $10k position wants to redeploy before resolution rather than wait two days — they'll take 99¢ to move on.
2. **Tax harvesting.** Realizing a gain at 99¢ vs waiting for $1 has cleaner bookkeeping.
3. **Panic / FUD.** Rumors of oracle disputes, delays, or manipulation. Occasionally right, usually wrong.
4. **Fat fingers.** Market sells by people who meant to market buy, or by scripts with broken sign logic.
5. **Resolution risk tail.** Actual non-zero probability of a dispute or adverse resolution. *This is the one real risk you are being paid for.*

### The math

Round-trip PnL on a single fill:

```
PnL = (payout − entry) − fees
    = ($1.00 − $0.99) − (2 × fee_rate × $0.01)   [fees on both sides capped by min(p, 1−p)]
    ≈ $0.01 − $0.0002
    ≈ $0.0098 per share ≈ 0.99% gross return
```

But capital turnover is high. If you cycle every 24 hours, that's ~250% annualized simple, compounded. With laddering (bids at 97, 98, 99) you catch more fills at higher gross margin:

- 97¢ fill → 3¢ gross, ~2.9¢ net → ~3% return
- 98¢ fill → 2¢ gross, ~1.9¢ net → ~1.9% return
- 99¢ fill → 1¢ gross, ~0.98¢ net → ~1% return

Expected weighted return per capital deployed depends entirely on fill distribution, which depends entirely on what kind of "almost-certain" contracts you target.

---

## 3. Key mechanics — what to target

Not every contract is tradeable this way. The sweet spot:

- **Resolution within 24-72 hours.** Longer holds compress annualized return and expose you to more disputes.
- **Clean resolution source.** Weather station data, election commission, sports final score. Avoid interpretation-heavy markets ("Will X tweet about Y") — those are where disputes happen.
- **Liquid enough to fill.** You need at least a few dozen USDC of daily volume at the 95-99 range for the strategy to be worth running.
- **Post-certainty window.** The actual outcome is known but resolution hasn't executed. For elections, this is the 48-72 hours between "AP calls it" and "Polymarket oracle confirms." For sports, it's the 1-24 hours after the game. For weather, it's the post-midnight period after the daily high is recorded.
- **Avoid any market with oracle controversy.** Check Discord, Twitter, and the market's dispute history.

---

## 4. Automation — how to replicate

The Polymarket CLOB has a Python client (`py-clob-client`) and a REST/WebSocket API. Full automation takes maybe 300 lines of Python.

### Minimum viable bot

```python
from py_clob_client.client import ClobClient
from py_clob_client.clob_types import OrderArgs, OrderType

client = ClobClient(host="https://clob.polymarket.com", key=PRIVATE_KEY, chain_id=137)
client.set_api_creds(client.create_or_derive_api_creds())

# 1. Scan all markets with end_date within 72h
markets = client.get_markets()
targets = [m for m in markets if is_near_resolution(m) and is_clean_source(m)]

# 2. For each target's YES token, post a laddered bid
for m in targets:
    token_id = m["tokens"][0]["token_id"]  # YES
    for price, size in [(0.99, 100), (0.98, 50), (0.97, 25)]:
        order = client.create_order(OrderArgs(
            price=price, size=size, side="BUY",
            token_id=token_id
        ))
        client.post_order(order, OrderType.GTC)

# 3. Watch fills via WS, redeem after resolution
```

### Sizing and risk

- **Cap per market.** Never more than ~2% of capital in any single market. Oracle disputes are the tail risk and they hit a single market at a time.
- **Diversify across 20-50 concurrent markets.** This is the whole point — aggregate the tail so a single bad resolution doesn't blow up the strategy.
- **Hard stop on dispute signals.** Monitor UMA (Polymarket's oracle) dispute status. If a market enters dispute, cancel orders immediately and consider merging YES/NO to exit.
- **Time-based cancel.** If a bid hasn't filled within its expected window, cancel and rotate capital.

### Existing tools

- **`direkturcrypto/polymarket-terminal`** — public repo for copy/scalp/sniper on Polymarket. Not exactly this strategy but the CLOB plumbing is reusable.
- **`py-clob-client`** — official Polymarket Python client. The only dependency you actually need.

---

## 5. Risks — the honest list

1. **Oracle disputes.** UMA can rule against the "obvious" outcome. Rare but has happened (contested election calls, ambiguous sports outcomes). This is the *real* risk you're being paid 1¢ for. If UMA rules NO on a contract where you bought YES at 99¢, you lose ~$0.99 per share. One bad resolution can erase months of edge. **Mitigation: diversification + hard dispute filter + never touch contested markets.**
2. **Smart contract risk.** CTF contract bugs, Polygon bridge issues, Polymarket operator actions.
3. **Resolution delays.** Your capital sits longer than modeled, compressing annualized return. Not catastrophic, just disappointing.
4. **Front-running / adverse selection.** The 1¢ of panic sellers knows something you don't about 5% of the time. That's priced in.
5. **Regulatory.** US persons technically can't trade Polymarket. This is your call, not mine to advise on.
6. **Competition from other bots.** This strategy is known. Depth at 99¢ has thinned as more bots run it. You need to be either faster, or post at 97-98¢ and accept more fill variance.

---

## 6. How this plugs into your trading-agent-team

This is a **capital-efficient, low-touch, low-correlation strategy** that fits the Unicron multi-strategy arena model well. It doesn't compete with the fast-cycler or Oracle Commander — it runs in parallel on Polymarket collateral while the perp strategies run on Hyperliquid collateral.

**Concrete integration ideas:**

1. **Pure-rules execution, zero AI in the hot path** — matches your rule from `feedback_rules_vs_agents.md`. The selection logic ("clean source, <72h to resolution, not disputed") is 100% deterministic. No LLM, no ML. The AI layer only runs at market-discovery time: nightly, an agent scans new markets and classifies them as eligible / not eligible with reasoning. Humans review the classification before markets go live.

2. **Watchdog pattern is a perfect fit.** Unicron's oversight spec already has a watchdog layer. For this strategy, the watchdog monitors UMA dispute events per open market. Dispute detected → cancel + exit via YES/NO merge immediately. This is the highest-leverage line of code in the whole bot.

3. **Challenge-game sweep.** Parameters: bid ladder shape `[97, 98, 99]` weights, per-market cap, time-to-resolution threshold, source-cleanliness score. Fitness: Sharpe of simulated PnL on replayed Polymarket historical data (available via their Subgraph). Cheap to evaluate, clear optimum surface.

4. **Paired with the weather bot.** The weather strategy (`polymarket-weather-trading.md`) builds a stable of positions it wants to exit close to resolution. The 99c bot is the *counterparty* to those exits. Running both strategies internally means the weather bot's exit cost goes to zero against your own book — that's a genuine operational synergy.

5. **Low capital to validate.** $500-$2000 is enough to run this live and get statistically meaningful fill data in a week. Much lower barrier than the perp strategies.

**Where to file it in the repo:** `/unicron/strategies/polymarket_99c/` with a shared `polymarket_clob.py` module also used by the weather strategy. Backtest harness uses Polymarket's Subgraph for historical order-book snapshots — same data layer as the weather bot.

---

## 7. TL;DR

You are selling insurance against Polymarket resolution tail risk at ~1% per cycle. The edge is structural (Polymarket's fee curve + forced liquidity providers on almost-resolved markets). The risk is oracle disputes, which you diversify away by spreading across 30+ concurrent markets and filtering out anything contested. Automation is ~300 lines. Annualized return is in the 30-100% range depending on fill-rate and dispute variance. It is not "free money" — the 1¢ is the premium you're collecting for taking a real, small, well-understood tail.
